<style>
    body{
        background-image: url(7w0T6Ukvki6aLE1nSGsj--0--MMkZv.jpg);
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
        margin: 0;
        padding: 0;
    }
</style>
    <div class="container">
        <h1>Upload Your CV</h1>
        <p>Create a profile and upload your CV to apply for jobs easily.</p>

        <form>
            <label>Full Name *</label>
            <input type="text" required>

            <label>Email Address *</label>
            <input type="email" required>

            <label>Phone Number</label>
            <input type="tel">

            <label>Location</label>
            <input type="text">

            <label>Skills (comma separated)</label>
            <input type="text" placeholder="e.g., HTML, Python, Communication">

            <label>Upload CV (PDF or DOC) *</label>

            <input type="file" accept=".pdf,.doc,.docx" required>

            <label>Cover Letter (Optional)</label>
            <textarea rows="4"></textarea>

            <button type="submit" class="btn btn-primary">Submit Application</button>
        </form>
        
        <div style="margin-top: 30px; text-align: center;">
            <h3>Need a CV Template?</h3>
            <a href="#" class="btn btn-secondary">Download Free CV Template</a>
        </div>
    </div>

    </footer>
